<!-- ===== ВИДЖЕТ "ДАРИТЕ ЗАБОТУ" ===== -->
<aside class="souvenir-widget" aria-label="Подарочный сертификат">
  <!-- 1. Верхний фон (крошки) -->
  <img
    src="images/back-crumbs.png"
    alt=""
    class="souvenir-widget__bg"
    aria-hidden="true"
  />

  <!-- 2. Декоративные коробки (лежат под текстом) -->
  <!-- Замени только блок с коробками -->
  <div class="souvenir-widget__decor-group">
    <img
      src="images/present-yellow.png"
      alt=""
      class="souvenir-widget__box souvenir-widget__box--yellow"
      aria-hidden="true"
    />
    <img
      src="images/present-turquoise.png"
      alt=""
      class="souvenir-widget__box souvenir-widget__box--turquoise"
      aria-hidden="true"
    />
    <img
      src="images/present-red.png"
      alt=""
      class="souvenir-widget__box souvenir-widget__box--red"
      aria-hidden="true"
    />
  </div>

  <!-- 3. Гибкий текстовый блок -->
  <div class="souvenir-widget__text">Дарите заботу</div>
</aside>
