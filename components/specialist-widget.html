<!-- ===== ВИДЖЕТ СПЕЦИАЛИСТА ===== -->
<aside class="specialist-widget" aria-label="Карточка психолога">
  <!-- 🔹 НОВЫЙ БЛОК СТАТУСОВ (ВЕРХ-ЛЕВО) -->
  <div class="specialist-widget__status-block">
    <!-- 1. Переписка -->
    <div
      class="specialist-widget__status-row specialist-widget__status-row--chat"
    >
      <img
        src="images/rewrite.png"
        alt=""
        class="specialist-widget__status-icon"
      />
      <span>Переписка</span>
    </div>

    <!-- 2. Видео (текст заменил на "Видео" по смыслу иконки) -->
    <div
      class="specialist-widget__status-row specialist-widget__status-row--video"
    >
      <img
        src="images/camera.png"
        alt=""
        class="specialist-widget__status-icon"
      />
      <span>Видео</span>
    </div>
  </div>
  <img
    src="images/specialist_photo.png"
    alt="Фото психолога Лилия"
    class="specialist-widget__photo"
  />

  <div class="specialist-widget__info">
    <span class="specialist-widget__name">Лилия</span>
    <span class="specialist-widget__spec">Психолог</span>

    <div class="specialist-widget__meta">
      <span class="specialist-widget__meta-item">Опыт 6 лет</span>
      <span class="specialist-widget__meta-dot"></span>
      <span class="specialist-widget__meta-item">43 года</span>
    </div>
  </div>

  <!-- Разделитель -->
  <div class="specialist-widget__divider"></div>

  <!-- Список услуг -->
  <div class="specialist-widget__services">
    <h4 class="specialist-widget__services-title">С чем работает психолог</h4>

    <div class="specialist-widget__service-item">
      <span class="specialist-widget__marker"></span>
      <span class="specialist-widget__service-text">Тревога, тревожности</span>
    </div>

    <div class="specialist-widget__service-item">
      <span class="specialist-widget__marker"></span>
      <span class="specialist-widget__service-text">Подавленность</span>
    </div>

    <!-- 🔹 3-й ПУНКТ -->
    <div class="specialist-widget__service-item">
      <span class="specialist-widget__marker"></span>
      <span class="specialist-widget__service-text"
        >Тревога и панические атаки</span
      >
    </div>
  </div>
  <!-- 🔹 КНОПКА (идентична первой) -->
  <button class="specialist-widget__btn" type="button">Подробнее</button>
</aside>
