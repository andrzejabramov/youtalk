    <!-- 🔹 ВИЗУАЛЬНЫЙ ИНДИКАТОР ШИРИНЫ (для тестов) -->
    <div
      id="viewport-indicator"
      style="
        position: fixed;
        top: 0;
        left: 0;
        background: #ff6b6b;
        color: white;
        padding: 4px 8px;
        font: 12px monospace;
        z-index: 9999;
        pointer-events: none;
      "
    >
      Width: <span id="vw-value">?</span>px
    </div>

    <script>
      const indicator = document.getElementById("vw-value");
      const update = () => (indicator.textContent = window.innerWidth);
      update();
      window.addEventListener("resize", update);
